<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ .Params.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f9f9f9;
        color: #333;
      }
  
      .container {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 20px;
        background-color: #f9f9f9;
        /* Mantenemos el mismo color de fondo para toda la página */
        height: 100vh;
        /* Altura fija para ocupar toda la altura de la ventana */
      }
  
      .sidebar {
        width: 25%;
        padding: 20px;
        /* No cambiamos el color de fondo para que sea el mismo que el del body */
      }
  
      .content {
        width: 70%;
        padding: 20px;
        background-color: #fff;
        /* Color de fondo para el contenido */
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        /* Sombra sutil */
        overflow-y: auto;
        /* Añadimos scroll vertical si es necesario */
        height: 100%;
        /* Altura fija para ocupar toda la altura del contenedor */
        overflow-y: auto;
        scrollbar-width: thin;
        /* Ancho del scroll */
        scrollbar-color: #999 transparent;
        /* Color del scroll */
      }
  
      .sidebar h1 {
        margin-top: 0;
      }
  
      .sidebar img {
        max-width: 100%;
        height: auto;
        border-radius: 5px;
        margin-bottom: 10px;
      }
  
      .sidebar a {
        display: block;
        margin-bottom: 5px;
        color: #333;
        text-decoration: none;
      }
  
      .sidebar a:hover {
        color: #007bff;
      }
  
      .tags {
        margin-top: 20px;
      }
  
      .tags li {
        display: inline-block;
        margin-right: 5px;
        background-color: #f1f1f1;
        padding: 3px 8px;
        border-radius: 5px;
      }
  
      .tags li:hover {
        background-color: #e9ecef;
      }
  
      .content h2 {
        margin-top: 0;
      }
  
      .author-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        grid-gap: 10px;
        margin-top: 20px;
      }
  
      .author {
        text-align: center;
      }
  
      .author img {
        max-width: 100px;
        max-height: 100px;
        border-radius: 50%;
        margin-bottom: 5px;
      }
  
      .examples li {
        margin-bottom: 10px;
      }
  
      .citation {
        white-space: pre-wrap;
        margin-top: 20px;
      }
  
      /* Estilos para el botón "Back to Data" */
      .back-to-data {
        position: fixed;
        /* Fijamos el botón en la esquina superior derecha */
        top: 10px;
        z-index: 1000;
        /* Aseguramos que esté por encima de otros elementos */
        text-decoration: none;
        margin-left: 20px;
      }
    </style>
</head>
<body>
    <a href="/isp/data/" class="back-to-data"><i class="fa-solid fa-arrow-right-from-bracket"></i> Back to Data</a>
    <div class="container">
        <div class="sidebar">
            <h1>{{ .Params.title }}</h1>
            <p>{{ .Params.subtitle }}</p>
            <img src="{{ .Params.logo }}" alt="Logo">
            <a href="{{ .Params.github }}" target="_blank"><i class="fab fa-github" style="font-size: 23px;"></i> GitHub</a>
            <a href="{{ .Params.huggingface }}" target="_blank" style="margin-left: -5px;"><img src="/isp/images/data/hf-logo.png" style="width: 30px; height:  30px;"> Hugging Face</a>
            <div class="tags">
                <h3>Tags:</h3>
                <ul>
                    {{ range .Params.tags }}
                    <li>{{ . }}</li>
                    {{ end }}
                </ul>
            </div>
        </div>
        <div class="content">
            <div class="scrollable-content">
                {{ .Content }}
            </div>
        </div>
    </div>
</body>
</html>
