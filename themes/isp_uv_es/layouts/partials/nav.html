  .nav-item .nav-link {
  position: relative;
  display: inline-block;
}

.nav-item .nav-link::after {
  content: '';
  position: absolute;
  width: 0;
  height: 2px;
  background-color: #fff;
  bottom: -5px;
  left: 0;
  transition: width 0.3s;
}

.nav-item .nav-link:hover::after {
  width: 100%;
}

.dropdown-menu {
  display: none;
  opacity: 0;
  transition: opacity 0.5s;
}


.dropdown-toggle::after {
    display: inline-block;
    margin-left: initial;
    vertical-align: 0.255em;
    content: "";

    border-left: initial;
}

</style>

<script>
document.querySelectorAll('.nav-item.dropdown').forEach(item => {
  item.addEventListener('mouseenter', function(e) {
    let dropdownMenu = this.querySelector('.dropdown-menu');
    if (dropdownMenu) {
      dropdownMenu.style.display = 'block';
      setTimeout(() => dropdownMenu.style.opacity = 1, 0); // Asegura que la transición se ejecute después de que el display cambie a block
    }
  });

  item.addEventListener('mouseleave', function(e) {
    let dropdownMenu = this.querySelector('.dropdown-menu');
    if (dropdownMenu) {
      dropdownMenu.style.opacity = 0;
      setTimeout(() => dropdownMenu.style.display = 'none', 500); // Asegura que el display cambie a none después de que la opacidad llegue a 0
    }
  });
});

  document.querySelectorAll('.dropdown-toggle').forEach(item => {
    item.removeAttribute('data-bs-toggle');
  });
</script>
<script>
  window.onload = function () {
    // Detectar la escala de la pantalla
    const scale = window.devicePixelRatio;

    // Obtener la barra de navegación
    const navbar = document.querySelector('.navbar-collapse');

    // Si la escala es mayor o igual a 1.25, agregar la clase para mostrar el menú desplegable
    if (scale >= 1.25) {
      navbar.classList.add('show');
    }
  };
</script>
