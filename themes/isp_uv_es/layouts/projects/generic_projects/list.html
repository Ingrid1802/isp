<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>{{ .Params.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="/isp/generic_projects.css">
</head>

<body>
  <div class="container">
    <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top">
      <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo01"
          aria-controls="navbarTogglerDemo01" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarTogglerDemo01">
          <div class="d-flex">
            {{ $currentProject := .Params.title }}
            {{ $currentOptions := index .Site.Params.projects $currentProject }}
            {{ range $currentOptions.nav_options }}
              <ul class="navbar-nav mx-auto mb-lg-0">
                <li class="nav-item px-2 nav-item-highlight">
                  <a class="nav-link active a" aria-current="page" href="{{ .url }}">{{ .label }}</a>
                </li>
              </ul>
            {{ end }}
          </div>
        </div>
        <a class="navbar-brand ms-auto" href="/isp/projects/" style="color: #949494;">Back to ISP <i class="fa-solid fa-right-to-bracket"></i></a>
      </div>
    </nav>
    <div class="row" style="margin-top: 80px;">
      <div class="col-md-8" style="text-align: justify;">
        {{ .Content }}
      </div>
      
      <div class="col-md-4">
        <div class="news-box">
          <table class="table table-bordered table-hover" style="border-color: #ebccd1;">
            <thead>
              <tr>
                <th style="color: #a94442; background-image: linear-gradient(to bottom, #f2dede 0, #ebcccc 100%);">News</th>
              </tr>
            </thead>
            <tbody style="font-size: 12px;">
              {{ range .Params.News }}
              <tr>
                <td style="padding: 15px; font-weight: 500; line-height: 1.1;"><a href="{{ .url }}" style="text-decoration: none; color: #555;">{{ .title }}</a></td>
              </tr>
            {{ end }}            
            </tbody>
          </table>
        </div>
      </div>
      
    </div>
  </div>
</body>

<!-- scripts para el nav-->
<script>
  document.querySelectorAll('.dropdown-toggle').forEach(item => {
    item.removeAttribute('data-bs-toggle');
});
</script>
<script>
  window.onload = function() {
    // Detectar la escala de la pantalla
    const scale = window.devicePixelRatio;
    
    // Obtener la barra de navegación
    const navbar = document.querySelector('.navbar-collapse');
    
    // Si la escala es mayor o igual a 1.25, agregar la clase para mostrar el menú desplegable
    if (scale >= 1.25) {
      navbar.classList.add('show');
    }
  };
</script>

</html>
